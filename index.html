<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thiệp Cưới - Tú & Mai</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: url('https://images.unsplash.com/photo-1519744792095-2f2205e87b6f?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }
    .overlay {
      background-color: rgba(255, 255, 255, 0.85);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3em;
      margin-bottom: 10px;
      color: #b85c38;
    }
    h2 {
      margin-top: 0;
      font-weight: normal;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    .btn {
      background-color: #b85c38;
      color: white;
      padding: 12px 24px;
      margin-top: 20px;
      text-decoration: none;
      border-radius: 5px;
      display: inline-block;
    }
    .details {
      margin-top: 20px;
      font-size: 1.1em;
      line-height: 1.6em;
    }
    iframe {
      width: 100%;
      border: none;
      border-radius: 10px;
      margin-top: 20px;
      height: 300px;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="card">
      <h1>Tú & Mai</h1>
      <h2>Trân trọng kính mời</h2>
      <p>Đến chung vui cùng chúng tôi trong ngày trọng đại</p>

      <div class="details">
        <p><strong>⏰ Thời gian:</strong><br>17:00, Thứ Bảy, ngày 20 tháng 7 năm 2025</p>
        <p><strong>📍 Địa điểm:</strong><br>Nhà hàng Crystal Palace, 13 Nguyễn Lương Bằng, Quận 7, TP.HCM</p>
      </div>

      <a class="btn" href="https://forms.gle/your-form-link" target="_blank">Xác nhận tham dự</a>

      <!-- Google Map -->
      <iframe src="https://www.google.com/maps/embed?pb=!1m18..."></iframe>
    </div>
  </div>
</body>
</html>
